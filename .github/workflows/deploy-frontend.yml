name: Deploy Frontend

# Builds docs/ into a Pages artifact (token injected from secret — never committed to git)
# and deploys via GitHub Actions Pages deployment.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Build site with injected token
        run: |
          mkdir _site
          cp docs/index.html _site/index.html
          cp docs/style.css  _site/style.css
          cp docs/logo.png   _site/logo.png
          sed "s/PASTE_YOUR_TOKEN_HERE/${{ secrets.SHARED_TOKEN }}/" docs/app.js > _site/app.js
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
